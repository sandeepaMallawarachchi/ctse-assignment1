name: Backend Service Deploy

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_dir:
        required: true
        type: string
      ecr_repository:
        required: true
        type: string
      ecs_service:
        required: true
        type: string
      aws_region:
        required: true
        type: string
      ecs_cluster:
        required: true
        type: string

jobs:
  build-and-verify:
    name: Build and Verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw
        working-directory: ${{ inputs.service_dir }}

      - name: Build service
        run: ./mvnw -B verify --no-transfer-progress
        working-directory: ${{ inputs.service_dir }}

  build-push-deploy:
    name: Push Image and Deploy
    runs-on: ubuntu-latest
    needs: build-and-verify
    if: github.event_name != 'pull_request'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com
          IMAGE_REPOSITORY: ${{ inputs.ecr_repository }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --tag "$ECR_REGISTRY/$IMAGE_REPOSITORY:latest" \
            --tag "$ECR_REGISTRY/$IMAGE_REPOSITORY:$IMAGE_TAG" \
            "${{ inputs.service_dir }}" \
            --push

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster "${{ inputs.ecs_cluster }}" \
            --service "${{ inputs.ecs_service }}" \
            --force-new-deployment \
            --region "${{ inputs.aws_region }}"

