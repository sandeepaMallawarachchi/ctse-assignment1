spring.application.name=product-catelog-service
server.port=8081

# MongoDB Atlas
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://ctse:ctse123@cluster0.k0gsnkn.mongodb.net/?appName=Cluster0}

# JWT validation (shared with Auth service)
# Use a Base64-encoded secret key with at least 32 bytes
app.jwt.secret=${JWT_SECRET_BASE64:U3VwZXJTZWNyZXRLZXlTdXBlclNlY3JldEtleVN1cGVyU2VjcmV0S2V5MTIzNDU2}
app.jwt.issuer=${JWT_ISSUER:auth-service}

# AWS S3
app.aws.s3.region=${AWS_REGION:us-east-1}
app.aws.s3.bucket=${AWS_S3_BUCKET:your-bucket-name}
app.aws.s3.access-key=${AWS_ACCESS_KEY_ID:}
app.aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}
app.aws.s3.key-prefix=${AWS_S3_KEY_PREFIX:products}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JSON response behavior
spring.jackson.default-property-inclusion=non_null

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
