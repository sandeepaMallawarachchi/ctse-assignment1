spring.application.name=api-gateway
server.port=8080

management.endpoints.web.exposure.include=health,info

spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins=${ALLOWED_ORIGINS:http://localhost:3000}
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.server.webflux.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin, RETAIN_FIRST

product-catalog.service.url=${PRODUCT_CATALOG_SERVICE_URL:http://localhost:8081}
auth-service.service.url=${AUTH_SERVICE_URL:http://localhost:8082}
cart-order.service.url=${CART_ORDER_SERVICE_URL:http://localhost:8084}

spring.cloud.gateway.server.webflux.routes[0].id=product-catalog-api
spring.cloud.gateway.server.webflux.routes[0].uri=${product-catalog.service.url}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/products/**,/api/categories/**

spring.cloud.gateway.server.webflux.routes[1].id=product-catalog-docs
spring.cloud.gateway.server.webflux.routes[1].uri=${product-catalog.service.url}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/product-catalog/v3/api-docs
spring.cloud.gateway.server.webflux.routes[1].filters[0]=RewritePath=/product-catalog/(?<segment>.*), /${segment}

spring.cloud.gateway.server.webflux.routes[2].id=auth-service-api
spring.cloud.gateway.server.webflux.routes[2].uri=${auth-service.service.url}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/auth/**,/oauth2/**,/login/oauth2/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=PreserveHostHeader

spring.cloud.gateway.server.webflux.routes[3].id=auth-service-docs
spring.cloud.gateway.server.webflux.routes[3].uri=${auth-service.service.url}
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/auth-service/v3/api-docs
spring.cloud.gateway.server.webflux.routes[3].filters[0]=RewritePath=/auth-service/(?<segment>.*), /${segment}

spring.cloud.gateway.server.webflux.routes[4].id=cart-order-api
spring.cloud.gateway.server.webflux.routes[4].uri=${cart-order.service.url}
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/cart/**,/api/orders/**,/api/coupons/**

spring.cloud.gateway.server.webflux.routes[5].id=cart-order-docs
spring.cloud.gateway.server.webflux.routes[5].uri=${cart-order.service.url}
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/cart-order-service/v3/api-docs
spring.cloud.gateway.server.webflux.routes[5].filters[0]=RewritePath=/cart-order-service/(?<segment>.*), /${segment}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=product-catalog-service
springdoc.swagger-ui.urls[0].url=/product-catalog/v3/api-docs
springdoc.swagger-ui.urls[1].name=auth-service
springdoc.swagger-ui.urls[1].url=/auth-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=cart-order-service
springdoc.swagger-ui.urls[2].url=/cart-order-service/v3/api-docs
